<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src 'self' ws: wss:; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Terminal</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #login-screen,
        #chat-screen,
        #nuke-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        #login-screen.active,
        #chat-screen.active,
        #nuke-screen.active {
            display: flex;
        }

        input,
        button {
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            margin: 10px;
            outline: none;
            border-radius: 0;
            text-transform: uppercase;
        }

        button:hover {
            background: #fff;
            color: #000;
            cursor: pointer;
        }

        input:focus {
            border-color: #888;
        }

        #messages {
            flex-grow: 1;
            width: 100%;
            max-width: 800px;
            border: 2px solid #fff;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .msg-admin {
            color: #ccc;
            text-align: left;
        }

        .msg-user {
            color: #fff;
            text-align: right;
        }

        #input-area {
            width: 100%;
            max-width: 800px;
            display: flex;
        }

        #msg-input {
            flex-grow: 1;
            margin: 0;
            border-right: none;
        }

        #send-btn {
            margin: 0;
        }

        #nuke-screen h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            border: 2px solid #fff;
            padding: 20px;
        }

        #token-display {
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed #fff;
            text-align: center;
        }
    </style>
</head>

<body>

    <noscript>
        <div
            style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#fff;font-family:'Courier New',Courier,monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;text-align:center;padding:2rem;">
            <p style="color:#cc3333;font-size:1.4rem;letter-spacing:4px;margin-bottom:1.5rem;">[ ERROR ]</p>
            <p style="margin-bottom:0.8rem;font-size:1rem;color:#e0e0e0;">JAVASCRIPT DESHABILITADO</p>
        </div>
    </noscript>

    <div id="login-screen" class="active">
        <h2>TERMINAL ACCESS</h2>
        <input type="text" id="username" placeholder="USERNAME" autocomplete="off">
        <input type="text" id="token-input" placeholder="TOKEN (LEAVE BLANK FOR NEW)" autocomplete="off">
        <button id="connect-btn">CONNECT</button>
        <div id="token-display" style="display:none;">
            YOUR TOKEN: <span id="token-value"></span><br>
        </div>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="> TYPE MESSAGE..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <div id="nuke-screen">
        <h1>TERMINAL DESCONECTADA</h1>
    </div>

    <script src="client.js"></script>
</body>

</html>
